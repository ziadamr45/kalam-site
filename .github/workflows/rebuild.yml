name: Vercel Rebuild (daily backup)

# Runs once a day at midnight UTC (≈ 02:00 Cairo time).
# Acts as a daily backup in case Notion content changes weren't picked up
# by a git push. The primary deploy mechanism is the Vercel Deploy Hook
# (called automatically when the user pushes to main, since Vercel is now
# connected to the GitHub repo).
# Can also be triggered manually from the Actions tab.

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild:
    name: Trigger Vercel production rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production deployment via Vercel API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          echo "⏳ Triggering Vercel production deployment at $(date -u '+%Y-%m-%d %H:%M:%S UTC')..."

          # Pull latest committed files from main branch, hash them by SHA, upload, then deploy.
          # Vercel will run `npm install && npm run build` on its build machines, which
          # re-queries Notion for published articles and regenerates site/.

          # Step 1: fetch the repo tree from GitHub API (recursive)
          TREE_JSON=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/git/trees/main?recursive=1")

          # Step 2: for each blob, fetch raw content, compute SHA, upload to Vercel
          SHAS_FILE=$(mktemp)
          echo "[" > "$SHAS_FILE"
          FIRST=1

          # Get the list of blob paths (filter out node_modules, site, .git, .env, .github)
          PATHS=$(echo "$TREE_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          paths = []
          for t in d.get('tree', []):
              if t.get('type') != 'blob':
                  continue
              p = t.get('path', '')
              # Skip generated / secret / CI files
              if p.startswith('node_modules/') or p.startswith('site/') or p.startswith('.git/'):
                  continue
              if p == '.env' or p == '.env.local':
                  continue
              if p.startswith('.github/'):
                  continue
              paths.append(p)
          for p in paths:
              print(p)
          ")

          for P in $PATHS; do
              # Fetch raw content
              RAW=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/contents/$P" \
                | python3 -c "import sys, json, base64; d=json.load(sys.stdin); sys.stdout.buffer.write(base64.b64decode(d['content']))")

              # Compute sha1
              SHA=$(printf '%s' "$RAW" | sha1sum | awk '{print $1}')

              # Upload to Vercel /v2/files
              RES=$(printf '%s' "$RAW" | curl -s -o /dev/null -w "%{http_code}" \
                -X POST "https://api.vercel.com/v2/files" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                -H "x-vercel-digest: $SHA" \
                --data-binary "@-")
              if [ "$RES" != "200" ] && [ "$RES" != "409" ]; then
                  echo "  ✗ upload failed for $P (HTTP $RES)"
                  exit 1
              fi
              echo "  ✓ $P (sha=$SHA)"

              if [ $FIRST -eq 1 ]; then
                  FIRST=0
              else
                  echo "," >> "$SHAS_FILE"
              fi
              printf '  {"file":"%s","sha":"%s"}' "$P" "$SHA" >> "$SHAS_FILE"
          done

          echo "" >> "$SHAS_FILE"
          echo "]" >> "$SHAS_FILE"

          # Step 3: create production deployment referencing SHAs
          DEPLOY_RESP=$(python3 -c "
          import json, sys, urllib.request, urllib.error
          with open('$SHAS_FILE') as f:
              shas = json.load(f)
          payload = {
              'name': 'kalam-site',
              'files': shas,
              'projectSettings': {
                  'framework': None,
                  'buildCommand': 'npm install && npm run build',
                  'outputDirectory': 'site',
                  'installCommand': 'npm install'
              },
              'target': 'production'
          }
          req = urllib.request.Request(
              'https://api.vercel.com/v13/deployments?projectId=$VERCEL_PROJECT_ID&skipBuildDetection=1',
              data=json.dumps(payload).encode('utf-8'),
              headers={'Authorization': 'Bearer $VERCEL_TOKEN', 'Content-Type': 'application/json'},
              method='POST'
          )
          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  print(resp.read().decode('utf-8'))
          except urllib.error.HTTPError as e:
              print('HTTP ' + str(e.code) + ': ' + e.read().decode('utf-8'), file=sys.stderr)
              sys.exit(1)
          ")

          DEPLOY_ID=$(echo "$DEPLOY_RESP" | python3 -c "import sys, json; print(json.load(sys.stdin).get('id',''))")
          DEPLOY_URL=$(echo "$DEPLOY_RESP" | python3 -c "import sys, json; print(json.load(sys.stdin).get('url',''))")
          echo "🚀 Triggered deployment: $DEPLOY_ID"
          echo "   URL: https://$DEPLOY_URL"

          # Step 4: poll for completion (max ~10 min)
          for i in $(seq 1 40); do
              sleep 15
              STATE=$(curl -s "https://api.vercel.com/v13/deployments/$DEPLOY_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                | python3 -c "import sys, json; print(json.load(sys.stdin).get('readyState','?'))")
              echo "  [$i] state=$STATE"
              if [ "$STATE" = "READY" ]; then
                  echo "✅ Deployment READY"
                  exit 0
              fi
              if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
                  echo "❌ Deployment $STATE"
                  exit 1
              fi
          done
          echo "⚠️ Timeout waiting for deployment"
          exit 1
