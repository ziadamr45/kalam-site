name: Vercel Rebuild (Notion → site)

# Polls Notion for content changes by rebuilding the site every 30 minutes.
# Notion API does not offer native webhooks for content changes on its database
# rows; the most reliable "near-real-time" option without a paid third-party
# automation tier is a fast polling cron. Combined with the manual deploy-hook
# trigger (created via setup-deploy-hook.yml), this gives both scheduled AND
# on-demand rebuilds.
#
# Can also be triggered manually from the Actions tab.

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild:
    name: Trigger Vercel production rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production deployment via Vercel API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          START_TS=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "⏳ Triggering Vercel production deployment at $START_TS..."

          # Step 1: fetch the repo tree from GitHub API (recursive)
          TREE_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/git/trees/main?recursive=1")

          # Step 2: for each blob, fetch raw content, compute SHA, upload to Vercel
          SHAS_FILE=$(mktemp)
          echo "[" > "$SHAS_FILE"
          FIRST=1

          PATHS=$(echo "$TREE_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          paths = []
          for t in d.get('tree', []):
              if t.get('type') != 'blob':
                  continue
              p = t.get('path', '')
              if p.startswith('node_modules/') or p.startswith('site/') or p.startswith('.git/'):
                  continue
              if p == '.env' or p == '.env.local':
                  continue
              if p.startswith('.github/'):
                  continue
              paths.append(p)
          for p in paths:
              print(p)
          ")

          FILE_COUNT=0
          for P in $PATHS; do
              RAW=$(curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$REPO/contents/$P" \
                | python3 -c "import sys, json, base64; d=json.load(sys.stdin); sys.stdout.buffer.write(base64.b64decode(d['content']))")

              SHA=$(printf '%s' "$RAW" | sha1sum | awk '{print $1}')

              RES=$(printf '%s' "$RAW" | curl -s -o /dev/null -w "%{http_code}" \
                -X POST "https://api.vercel.com/v2/files" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                -H "x-vercel-digest: $SHA" \
                --data-binary "@-")
              if [ "$RES" != "200" ] && [ "$RES" != "409" ]; then
                  echo "  ✗ upload failed for $P (HTTP $RES)"
                  exit 1
              fi

              if [ $FIRST -eq 1 ]; then
                  FIRST=0
              else
                  echo "," >> "$SHAS_FILE"
              fi
              printf '  {"file":"%s","sha":"%s"}' "$P" "$SHA" >> "$SHAS_FILE"
              FILE_COUNT=$((FILE_COUNT + 1))
          done

          echo "" >> "$SHAS_FILE"
          echo "]" >> "$SHAS_FILE"
          echo "  ✓ uploaded $FILE_COUNT files"

          # Step 3: create production deployment referencing SHAs
          DEPLOY_RESP=$(python3 -c "
          import json, sys, urllib.request, urllib.error
          with open('$SHAS_FILE') as f:
              shas = json.load(f)
          payload = {
              'name': 'kalam-site',
              'files': shas,
              'projectSettings': {
                  'framework': None,
                  'buildCommand': 'npm install && npm run build',
                  'outputDirectory': 'site',
                  'installCommand': 'npm install'
              },
              'target': 'production'
          }
          req = urllib.request.Request(
              'https://api.vercel.com/v13/deployments?projectId=$VERCEL_PROJECT_ID&skipBuildDetection=1',
              data=json.dumps(payload).encode('utf-8'),
              headers={'Authorization': 'Bearer $VERCEL_TOKEN', 'Content-Type': 'application/json'},
              method='POST'
          )
          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  print(resp.read().decode('utf-8'))
          except urllib.error.HTTPError as e:
              print('HTTP ' + str(e.code) + ': ' + e.read().decode('utf-8'), file=sys.stderr)
              sys.exit(1)
          ")

          DEPLOY_ID=$(echo "$DEPLOY_RESP" | python3 -c "import sys, json; print(json.load(sys.stdin).get('id',''))")
          DEPLOY_URL=$(echo "$DEPLOY_RESP" | python3 -c "import sys, json; print(json.load(sys.stdin).get('url',''))")
          echo "🚀 Triggered deployment: $DEPLOY_ID"
          echo "   URL: https://$DEPLOY_URL"

          # Step 4: poll for completion (max ~10 min)
          FINAL_STATE="TIMEOUT"
          for i in $(seq 1 40); do
              sleep 15
              STATE=$(curl -s "https://api.vercel.com/v13/deployments/$DEPLOY_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                | python3 -c "import sys, json; print(json.load(sys.stdin).get('readyState','?'))")
              echo "  [$i] state=$STATE"
              if [ "$STATE" = "READY" ] || [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
                  FINAL_STATE="$STATE"
                  break
              fi
          done

          END_TS=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          # Step 5: write GitHub Actions Job Summary (visible at the top of the run page)
          {
            echo "## 🚀 Vercel Rebuild Summary"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Triggered at | \`$START_TS\` |"
            echo "| Finished at  | \`$END_TS\` |"
            echo "| Files uploaded | \`$FILE_COUNT\` |"
            echo "| Deployment ID | \`$DEPLOY_ID\` |"
            echo "| Deployment URL | https://$DEPLOY_URL |"
            echo "| Production alias | https://kalaam-site.vercel.app |"
            echo "| Final state | **$FINAL_STATE** |"
            echo ""
            if [ "$FINAL_STATE" = "READY" ]; then
              echo "✅ **SUCCESS** — site rebuilt from latest Notion content."
              echo ""
              echo "Live site: https://kalaam-site.vercel.app"
            else
              echo "❌ **FAILURE** — final state: $FINAL_STATE"
              echo ""
              echo "Check the Vercel deployment logs: https://vercel.com/ziadamr45/kalam-site/deployments/$DEPLOY_ID"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FINAL_STATE" = "READY" ]; then
              exit 0
          else
              exit 1
          fi
