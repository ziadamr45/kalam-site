name: Notion → Vercel instant rebuild

# ----------------------------------------------------------------------------
# Polls the Notion database every 10 minutes for recently-edited articles.
# If any published article (منشور = true) was edited in the last 15 min,
# triggers the Vercel deploy hook → site rebuilds within ~1 min.
#
# This is required because the Notion API does NOT support native webhooks
# on the free plan — polling is the cheapest reliable alternative.
# ----------------------------------------------------------------------------

on:
  schedule:
    # Every 10 minutes. GitHub Actions cron is best-effort and may be delayed
    # by ~5 min during peak hours, but typical latency is 1-3 min.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: notion-poll
  cancel-in-progress: false

jobs:
  poll-and-rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}

    steps:
      - name: Check required secrets
        id: check
        run: |
          if [ -z "$NOTION_TOKEN" ] || [ -z "$NOTION_DATABASE_ID" ] || [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "::warning::Missing one of NOTION_TOKEN / NOTION_DATABASE_ID / DEPLOY_HOOK_URL secrets — skipping poll."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Query Notion + maybe trigger Vercel
        if: steps.check.outputs.skip != 'true'
        env:
          GH_STEP_SUMMARY: $GITHUB_STEP_SUMMARY
        run: |
          set -euo pipefail

          # Save response to file so Python can read it cleanly (no quote/indent pain)
          RESPONSE_FILE=$(mktemp)

          SINCE=$(python3 -c "from datetime import datetime,timezone,timedelta; print((datetime.now(timezone.utc) - timedelta(minutes=15)).strftime('%Y-%m-%dT%H:%M:%S.000Z'))")
          echo "Looking for articles edited since: $SINCE"

          curl -s -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{
              \"filter\": {
                \"and\": [
                  { \"property\": \"منشور\", \"checkbox\": { \"equals\": true } },
                  { \"timestamp\": \"last_edited_time\", \"last_edited_time\": { \"on_or_after\": \"$SINCE\" } }
                ]
              },
              \"sorts\": [{ \"timestamp\": \"last_edited_time\", \"direction\": \"descending\" }],
              \"page_size\": 5
            }" > "$RESPONSE_FILE"

          # Parse count and titles in a single Python invocation
          PARSED=$(python3 - "$RESPONSE_FILE" <<'PYEOF'
          import json, sys, os
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              d = json.load(f)
          results = d.get('results', [])
          count = len(results)
          print(f"COUNT={count}")
          for r in results:
              t = r.get('properties', {}).get('العنوان', {})
              title = ''.join([x.get('plain_text','') for x in t.get('title', [])]) if t.get('title') else '?'
              edited = r.get('last_edited_time', '?')
              print(f"TITLE={title}|EDITED={edited}")
          PYEOF
          )

          echo "$PARSED"

          COUNT=$(echo "$PARSED" | head -1 | sed 's/COUNT=//')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$COUNT" = "0" ]; then
            echo "::notice::No Notion changes detected — skipping deploy."
            echo "## ✅ No Notion changes" >> "$GH_STEP_SUMMARY"
            echo "" >> "$GH_STEP_SUMMARY"
            echo "Last poll: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GH_STEP_SUMMARY"
            echo "Site not rebuilt — no changes detected in last 15 min." >> "$GH_STEP_SUMMARY"
          else
            echo "::notice::Notion changes detected — will trigger Vercel deploy hook."

            # Append titles to job summary
            {
              echo "## 📝 Notion changes detected"
              echo ""
              echo "Articles edited in the last 15 minutes:"
              echo ""
              echo "$PARSED" | tail -n +2 | while IFS='|' read -r title_part edited_part; do
                title="${title_part#TITLE=}"
                edited="${edited_part#EDITED=}"
                echo "- **${title}** — last edited: \`${edited}\`"
              done
              echo ""
            } >> "$GH_STEP_SUMMARY"

            # Trigger the Vercel deploy hook
            echo "Triggering Vercel deploy hook..."
            HOOK_RESPONSE=$(curl -s -X POST "$DEPLOY_HOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{}')
            echo "Vercel response: $HOOK_RESPONSE"
            JOB_STATE=$(echo "$HOOK_RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('job',{}).get('state','UNKNOWN'))")
            echo "::notice::Vercel deploy hook accepted — job state: $JOB_STATE"
            {
              echo "## ✅ Vercel deploy triggered"
              echo ""
              echo "Job state: \`$JOB_STATE\` — site will rebuild within ~1 min."
              echo ""
              echo "Live URL: https://kalaam-site.vercel.app"
            } >> "$GH_STEP_SUMMARY"
          fi

          rm -f "$RESPONSE_FILE"
        id: notion
